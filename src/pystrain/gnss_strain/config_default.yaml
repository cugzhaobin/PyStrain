# GNSS 应变率计算配置文件
# 所有路径均相对于当前工作目录（运行 python example.py 时的目录）
# 用法：python example.py --config config_default.yaml

# ── 数据输入输出 ───────────────────────────────────────────────────────────────
data:
  vel_file:  './camp_eura.vel'  # 速度场文件路径
  poly_file: null               # 研究区边界多边形文件（.poly），null 表示自动矩形边界
  output_dir: './output'        # 输出目录（自动创建）

  format: 'auto'                # 输入文件格式：
                                #   auto  — 按列数自动判断 (8列→gmt, 13列→globk)
                                #   gmt   — GMT 8列: lon lat Ve Vn Se Sn Rho SiteName
                                #   globk — GLOBK 13列: lon lat ve vn Ve_adj Vn_adj
                                #           Se Sn Rho Vu Vu_adj Su site
                                # 提示：使用 auto 时若文件含非标准列数，建议显式指定

# ── 异常值检测 ────────────────────────────────────────────────────────────────
outlier_detection:
  k_neighbors: 8        # KNN 邻居数 (整数, ≥3)
                        # 较小值对局部异常敏感，较大值更稳健
  mad_factor: 3.5       # KNN 预筛 MAD 阈值倍数 (>0)
                        # 越大越保守（保留更多站点）
  iqr_factor: 1.5       # 残差迭代检测 IQR 倍数 (>0)
                        # 越小越严格（剔除更多站点）
  max_iterations: 5     # 迭代异常值检测最大轮次 (整数, ≥1)

# ── 三角网划分与密度控制 ───────────────────────────────────────────────────────
triangulation:
  # 网格质量控制
  min_angle_deg: 10.0   # 最小三角形内角 (°)，范围 (0, 60)
                        # 越大网格越规则，但可能丢失边缘区域覆盖
  max_edge_pctl: 95.0   # 最大边长的百分位数阈值，范围 (0, 100)
                        # 超过 pctl(站点间距, max_edge_pctl) × max_edge_factor 的边所在三角形被剔除
  max_edge_factor: 1.5  # 最大边长 = 百分位数 × factor (>1.0)

  # 密度控制（null = 不启用，向后兼容）
  min_spacing_km: null  # 站点最小间距 (km, >0 或 null)
                        # 作用：三角化前对输入站点抽稀，防止局部过密产生病态小三角形
                        # 策略：两站距离 < 阈值时，保留速度不确定度 σ=√(Se²+Sn²) 更小的站点
                        # 建议值：约为平均站点间距的 1/3 ~ 1/2
                        # 示例：min_spacing_km: 30.0

  max_edge_km: null     # 三角形边长绝对上限 (km, >0 或 null)
                        # 作用：三角化后直接剔除含超长边的三角形，防止跨越大空白区的连接
                        # 与 max_edge_pctl/factor 的区别：此为绝对硬约束，不随数据密度变化
                        # 建议值：约为研究区预期最大合理三角形边长
                        # 示例：max_edge_km: 200.0

# ── 应变率空间光滑 ────────────────────────────────────────────────────────────
smoothing:
  weight: 0.3           # 光滑权重 [0.0, 1.0]
                        # 0 = 不光滑（原始值），1 = 完全替换为邻居均值
                        # 推荐范围：0.1 ~ 0.5
  iterations: 3         # 光滑迭代次数 (整数, ≥0)
                        # 0 = 不光滑，次数越多扩散效果越强

# ── 不确定度估计 ──────────────────────────────────────────────────────────────
uncertainty:
  mc_iterations: 200    # Monte Carlo 采样次数 (整数, ≥10)
                        # 越多结果越稳定，但计算耗时增加
                        # 快速测试建议：50；正式计算建议：200~500

# ── 可视化输出 ────────────────────────────────────────────────────────────────
visualization:
  dpi: 150              # 输出图片分辨率 (整数, ≥50)
  save_figures: true    # 是否保存图片到 output_dir
  show_figures: false   # 是否弹出交互窗口（服务器环境建议设为 false）
